{% set name = "nrtk" %}
{% set version = "0.27.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nrtk-{{ version }}.tar.gz
  sha256: 0e609f67499a5d5f5357f690fd9cbde2363210702a9a23b006943c2a207a5496

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry-core >=2.2
  run:
    - python >={{ python_min }}
    - lazy_loader >=0.4
    - numpy >=1.26
    - smqtk-classifier >=0.20.0
    - smqtk-core >=0.21
    - smqtk-detection >=0.23.0
    - smqtk-image-io >=0.18.0
    - tqdm >=4.66.3
    - pycocotools >=2.0.10
    - setuptools >=78.1.1
    - typing-extensions >=4.5.0
    - nrtk-albumentations >=2.2.1
    - pybsm >=0.14.3
    - maite >=0.9.2,<0.10.0
    - kwcoco >=0.2.18
    - pillow >=12.1.1
    - click >=8.0.0
    - fastapi >=0.110.0
    - uvicorn >=0.29.0
    - pydantic >=2.6.4
    - pydantic-settings >=2.2.1
    - scikit-image >=0.20
    - scipy >=1.10.0
    - numba >=0.56.4
    - pytorch >=2.6.0
    - diffusers >=0.21.0
    - accelerate >=0.20.0
    - transformers >=4.53.0
    - protobuf >=6.33.5

test:
  imports:
    - nrtk
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/nrtk/
  summary: |
    The nrtk package is an open source toolkit for evaluating the natural robustness of
    computer vision algorithms to various perturbations, including sensor-specific
    changes to camera focal length, aperture diameter, etc
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - martinduffy1
    - eveenhuis
    - bjrichardwebster
    - Purg
    - barry-ravichandran
